<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Interactive Hand Particle System</title>

<style>
  body{
    margin:0;
    overflow:hidden;
    background:black;
  }

  canvas{
    display:block;
  }

  #video{
    position:fixed;
    right:10px;
    bottom:10px;
    width:120px;
    border-radius:12px;
    opacity:0.35;
    z-index:10;
  }

  #text{
    position:fixed;
    top:10px;
    left:10px;
    color:white;
    font-family:sans-serif;
    z-index:10;
    font-size:14px;
  }
</style>
</head>

<body>

<div id="text">
  ✋ Move hand = Move particles<br>
  🤏 Pinch = Change colors<br>
  ✌️ Two fingers = Change shape
</div>

<video id="video" autoplay playsinline></video>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

/* ---------------- SCENE ---------------- */

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  60,
  window.innerWidth/window.innerHeight,
  0.1,
  1000
);

camera.position.z = 8;

const renderer = new THREE.WebGLRenderer({
  antialias:true
});

renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);

document.body.appendChild(renderer.domElement);

window.addEventListener("resize",()=>{

  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();

  renderer.setSize(window.innerWidth,window.innerHeight);

});

/* ---------------- PARTICLES ---------------- */

const COUNT = 3500;

const geometry = new THREE.BufferGeometry();

const positions = new Float32Array(COUNT * 3);
const colors = new Float32Array(COUNT * 3);

const tempColor = new THREE.Color();

let currentShape = 0;

const shapes = ["heart","flower","saturn","sphere"];

function generateShape(type){

  for(let i=0;i<COUNT;i++){

    let x,y,z;

    if(type==="heart"){

      const t = Math.random() * Math.PI * 2;

      x = 16 * Math.pow(Math.sin(t),3)/16;

      y =
        (
          13*Math.cos(t)
          -5*Math.cos(2*t)
          -2*Math.cos(3*t)
          -Math.cos(4*t)
        ) /16;

      z = (Math.random()-0.5)*0.5;

    }

    else if(type==="flower"){

      const a = Math.random()*Math.PI*2;

      const r = Math.sin(6*a);

      x = Math.cos(a)*r*2;

      y = Math.sin(a)*r*2;

      z = (Math.random()-0.5);

    }

    else if(type==="saturn"){

      const a = Math.random()*Math.PI*2;

      const r = 2 + Math.random()*0.3;

      x = Math.cos(a)*r;

      z = Math.sin(a)*r;

      y = (Math.random()-0.5)*0.15;

    }

    else{

      const phi = Math.acos(2*Math.random()-1);

      const theta = Math.random()*Math.PI*2;

      const r = Math.random()*2;

      x = r*Math.sin(phi)*Math.cos(theta);

      y = r*Math.sin(phi)*Math.sin(theta);

      z = r*Math.cos(phi);

    }

    positions[i*3] = x;
    positions[i*3+1] = y;
    positions[i*3+2] = z;

    tempColor.setHSL(i/COUNT,1,0.6);

    colors[i*3] = tempColor.r;
    colors[i*3+1] = tempColor.g;
    colors[i*3+2] = tempColor.b;

  }

  geometry.setAttribute(
    "position",
    new THREE.BufferAttribute(positions,3)
  );

  geometry.setAttribute(
    "color",
    new THREE.BufferAttribute(colors,3)
  );

}

generateShape("heart");

const material = new THREE.PointsMaterial({
  size:0.045,
  vertexColors:true,
  transparent:true,
  blending:THREE.AdditiveBlending,
  depthWrite:false
});

const particles = new THREE.Points(geometry,material);

scene.add(particles);

/* ---------------- HAND CONTROL ---------------- */

const hand = {
  x:0,
  y:0
};

let targetScale = 1;

let lastSwitch = 0;

/* ---------------- ANIMATION ---------------- */

function animate(){

  requestAnimationFrame(animate);

  const pos = geometry.attributes.position.array;

  for(let i=0;i<COUNT;i++){

    const ix = i*3;

    pos[ix] += (hand.x - pos[ix]) * 0.0015;

    pos[ix+1] += (hand.y - pos[ix+1]) * 0.0015;

  }

  geometry.attributes.position.needsUpdate = true;

  particles.scale.lerp(
    new THREE.Vector3(targetScale,targetScale,targetScale),
    0.05
  );

  particles.rotation.y += 0.002;
  particles.rotation.x += 0.001;

  renderer.render(scene,camera);

}

animate();

/* ---------------- MEDIAPIPE ---------------- */

const video = document.getElementById("video");

const script1 = document.createElement("script");
script1.src =
"https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js";
document.body.appendChild(script1);

const script2 = document.createElement("script");
script2.src =
"https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js";
document.body.appendChild(script2);

script2.onload = ()=>{

  const hands = new Hands({
    locateFile:(file)=>{
      return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
    }
  });

  hands.setOptions({
    maxNumHands:1,
    modelComplexity:1,
    minDetectionConfidence:0.7,
    minTrackingConfidence:0.7
  });

  hands.onResults((results)=>{

    if(!results.multiHandLandmarks.length) return;

    const lm = results.multiHandLandmarks[0];

    const thumb = lm[4];
    const index = lm[8];
    const middle = lm[12];

    /* HAND POSITION */

    hand.x = (index.x - 0.5) * 10;

    hand.y = -(index.y - 0.5) * 10;

    /* PINCH */

    const pinch = Math.hypot(
      thumb.x - index.x,
      thumb.y - index.y
    );

    if(pinch < 0.07){

      material.color.setHSL(
        Math.random(),
        1,
        0.6
      );

    }

    /* EXPAND */

    targetScale = pinch > 0.18 ? 1.8 : 1;

    /* SWITCH SHAPES */

    const now = Date.now();

    if(
      Math.abs(index.y-middle.y) < 0.03 &&
      now-lastSwitch > 1200
    ){

      currentShape++;

      if(currentShape >= shapes.length){
        currentShape = 0;
      }

      generateShape(shapes[currentShape]);

      lastSwitch = now;

    }

  });

  const cam = new Camera(video,{
    onFrame:async()=>{
      await hands.send({image:video});
    },
    width:320,
    height:240
  });

  cam.start();

};

</script>

</body>
</html>
