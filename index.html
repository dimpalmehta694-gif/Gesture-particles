<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Gesture‑Controlled 3D Particles (Three.js)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    #video { position: fixed; right: 10px; bottom: 10px; width: 160px; opacity: 0.3; }
    #hint { position: fixed; left: 10px; bottom: 10px; color: #fff; font-family: sans-serif; font-size: 12px; opacity: 0.8; }
  </style>
</head>
<body>
<video id="video" autoplay playsinline></video>
<div id="hint">
  Open hand → Expand<br/>
  Pinch → Change color<br/>
  Two fingers → Switch shape
</div><!-- Three.js --><script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

/* ------------------ SCENE SETUP ------------------ */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 6;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ------------------ PARTICLES ------------------ */
const COUNT = 8000;
let geometry = new THREE.BufferGeometry();
let positions = new Float32Array(COUNT * 3);
let colors = new Float32Array(COUNT * 3);

const color = new THREE.Color();

function setShape(type) {
  for (let i = 0; i < COUNT; i++) {
    let x, y, z;

    if (type === 'heart') {
      const t = Math.random() * Math.PI * 2;
      x = 0.16 * Math.pow(Math.sin(t), 3);
      y = 0.13 * Math.cos(t) - 0.05 * Math.cos(2*t);
      z = (Math.random() - 0.5) * 0.2;
    }
    else if (type === 'saturn') {
      const a = Math.random() * Math.PI * 2;
      const r = 1.5 + Math.random() * 0.1;
      x = Math.cos(a) * r;
      z = Math.sin(a) * r;
      y = (Math.random() - 0.5) * 0.05;
    }
    else if (type === 'firework') {
      const phi = Math.acos(2*Math.random() - 1);
      const theta = Math.random() * Math.PI * 2;
      const r = Math.random();
      x = r * Math.sin(phi) * Math.cos(theta);
      y = r * Math.sin(phi) * Math.sin(theta);
      z = r * Math.cos(phi);
    }
    else { // flower
      const a = Math.random() * Math.PI * 2;
      const r = Math.sin(5 * a) * 1.2;
      x = Math.cos(a) * r;
      y = Math.sin(a) * r;
      z = (Math.random() - 0.5) * 0.2;
    }

    positions[i*3] = x * 2;
    positions[i*3+1] = y * 2;
    positions[i*3+2] = z * 2;

    color.setHSL(i / COUNT, 1, 0.6);
    colors.set([color.r, color.g, color.b], i*3);
  }

  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
}

setShape('heart');

const material = new THREE.PointsMaterial({
  size: 0.04,
  vertexColors: true,
  transparent: true,
  blending: THREE.AdditiveBlending
});

const points = new THREE.Points(geometry, material);
scene.add(points);

/* ------------------ ANIMATION ------------------ */
let expandTarget = 1;
let currentScale = 1;

function animate() {
  requestAnimationFrame(animate);

  currentScale += (expandTarget - currentScale) * 0.05;
  points.scale.setScalar(currentScale);

  points.rotation.y += 0.001;
  renderer.render(scene, camera);
}
animate();

/* ------------------ HAND TRACKING ------------------ */
import 'https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js';
import 'https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js';

const video = document.getElementById('video');

const hands = new Hands({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});

hands.setOptions({
  maxNumHands: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.7
});

let shapeIndex = 0;
const shapes = ['heart', 'flower', 'saturn', 'firework'];

hands.onResults(results => {
  if (!results.multiHandLandmarks?.length) return;

  const lm = results.multiHandLandmarks[0];
  const thumb = lm[4];
  const index = lm[8];
  const middle = lm[12];

  const pinch = Math.hypot(thumb.x - index.x, thumb.y - index.y);

  // Pinch → change color
  if (pinch < 0.04) {
    material.color.setHSL(Math.random(), 1, 0.6);
  }

  // Open hand → expand
  expandTarget = pinch > 0.12 ? 1.6 : 1;

  // Two fingers → switch shape
  if (Math.abs(index.y - middle.y) < 0.02) {
    shapeIndex = (shapeIndex + 1) % shapes.length;
    setShape(shapes[shapeIndex]);
  }
});

const cameraFeed = new Camera(video, {
  onFrame: async () => { await hands.send({ image: video }); },
  width: 640,
  height: 480
});

cameraFeed.start();
</script></body>
</html>
